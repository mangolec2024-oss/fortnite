<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortnite 2.0 - </title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; touch-action: none; }
        #gui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; z-index: 10; pointer-events: none; border-left: 4px solid #f1c40f; }
        #storm-info { position: absolute; top: 10px; right: 10px; color: #ff4444; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; font-weight: bold; z-index: 10; border: 1px solid red; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: red; transform: translate(-50%, -50%); }
        
        #ui-layer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 20; }
        #hp-bar-cont { width: 250px; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.1s; }
        #hp-text { color: white; font-weight: bold; margin-bottom: 5px; text-shadow: 2px 2px 2px #000; }

        .m-btn { position: absolute; width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; z-index: 20; }
        #b-shoot { bottom: 130px; right: 30px; background: rgba(231, 76, 60, 0.4); }
        #b-build { bottom: 40px; right: 130px; background: rgba(52, 152, 219, 0.4); }
        #b-jump { bottom: 130px; right: 130px; }
        #b-sprint { bottom: 40px; right: 30px; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 20; }
        
        #death { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #f1c40f; border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="gui"><b>WASD</b>: move | <b>LBM</b>: shoot | <b>RBM</b>: build | <b>SPACE</b>: jump</div>
    <div id="storm-info">ЗОНА: 400м</div>
    <div id="crosshair"></div>
    
    <div id="ui-layer">
        <div id="hp-text">100 HP</div>
        <div id="hp-bar-cont"><div id="hp-fill"></div></div>
    </div>

    <div id="joystick"></div>
    <div id="b-shoot" class="m-btn">🔥</div>
    <div id="b-build" class="m-btn">🧱</div>
    <div id="b-jump" class="m-btn">⬆️</div>
    <div id="b-sprint" class="m-btn">🏃</div>

    <div id="death">
        <h1>YOU WERE ELIMINATED</h1>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ІНІЦІАЛІЗАЦІЯ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);
        playerGroup.add(camera);
        camera.position.y = 1.7;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        const obstacles = [];
        const enemies = [];
        let playerHP = 100, isDead = false, isSprinting = false, vY = 0, canJump = true, stormRadius = 400;
        const clock = new THREE.Clock();

        // --- СВІТ ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({ color: 0x27ae60 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        for(let i=0; i<20; i++) {
            const h = 20 + Math.random()*30;
            const m = new THREE.Mesh(new THREE.ConeGeometry(15, h, 4), new THREE.MeshLambertMaterial({ color: 0x7f8c8d }));
            m.position.set(Math.random()*600-300, h/2, Math.random()*600-300);
            scene.add(m); obstacles.push(m);
        }

        function spawnTree(x, z) {
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(1.2, 6, 1.2), new THREE.MeshLambertMaterial({ color: 0x5d4037 }));
            trunk.position.set(x, 3, z);
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(3.5), new THREE.MeshLambertMaterial({ color: 0x2ecc71 }));
            leaves.position.set(x, 7, z);
            scene.add(trunk, leaves);
            obstacles.push(trunk);
        }
        for(let i=0; i<40; i++) spawnTree(Math.random()*400-200, Math.random()*400-200);

        const stormMesh = new THREE.Mesh(
            new THREE.CylinderGeometry(1, 1, 1000, 64, 1, true),
            new THREE.MeshBasicMaterial({ color: 0x6600ff, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
        );
        scene.add(stormMesh);

        const weapon = new THREE.Group();
        const bBody = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.22, 0.7), new THREE.MeshLambertMaterial({color: 0x2c3e50}));
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5), new THREE.MeshLambertMaterial({color: 0x000000}));
        barrel.rotation.x = Math.PI/2; barrel.position.z = -0.5;
        const stock = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.3, 0.3), new THREE.MeshLambertMaterial({color: 0x2c3e50}));
        stock.position.set(0, -0.1, 0.4);
        const muzzleFlash = new THREE.PointLight(0xffaa00, 0, 5);
        muzzleFlash.position.z = -0.8;
        weapon.add(bBody, barrel, stock, muzzleFlash);
        weapon.position.set(0.5, -0.35, -0.6);
        camera.add(weapon);

        // --- ФУНКЦІЇ КОЛІЗІЇ ---
        function checkCollision(pos, moveDir) {
            const ray = new THREE.Raycaster(pos.clone().add(new THREE.Vector3(0,1,0)), moveDir.clone().normalize());
            const intersects = ray.intersectObjects(obstacles);
            return (intersects.length > 0 && intersects[0].distance < 1.8);
        }

        function checkEnemyCollision(enemyPos, moveDir) {
            const ray = new THREE.Raycaster(enemyPos.clone().add(new THREE.Vector3(0, 1.5, 0)), moveDir.clone().normalize());
            const intersects = ray.intersectObjects(obstacles);
            return (intersects.length > 0 && intersects[0].distance < 2.5);
        }

        // --- МЕХАНІКИ ---
        function shoot() {
            if(isDead) return;
            weapon.position.z += 0.2;
            muzzleFlash.intensity = 15; setTimeout(() => muzzleFlash.intensity = 0, 50);

            const ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            const hits = ray.intersectObjects(enemies.map(e => e.mesh));
            if(hits.length > 0) {
                const en = enemies.find(e => e.mesh === hits[0].object);
                en.hp -= 35;
                en.updateHP();
                if(en.hp <= 0) {
                    scene.remove(en.mesh, en.hpCont);
                    enemies.splice(enemies.indexOf(en), 1);
                }
            }
        }

        function build() {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(5, 4, 0.6), new THREE.MeshLambertMaterial({ color: 0x8b4513 }));
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            const p = playerGroup.position.clone().add(dir.multiplyScalar(4));
            wall.position.set(p.x, 2, p.z); wall.rotation.y = playerGroup.rotation.y;
            scene.add(wall); obstacles.push(wall);
        }

        // --- КЕРУВАННЯ (PC + MOBILE LOOK) ---
        let keys = {}, moveJoy = {x:0, y:0};
        window.onkeydown = (e) => { 
            keys[e.code] = true;
            if(e.code === 'Space' && canJump) { vY = 0.25; canJump = false; }
        };
        window.onkeyup = (e) => keys[e.code] = false;
        window.onmousedown = (e) => {
            if(e.button === 0) shoot(); if(e.button === 2) build();
            if(!document.pointerLockElement) document.body.requestPointerLock();
        };

        // Мобільна камера (Touch Look)
        let touchX = 0, touchY = 0;
        document.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'CANVAS') {
                touchX = e.touches[0].pageX;
                touchY = e.touches[0].pageY;
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName === 'CANVAS') {
                const deltaX = e.touches[0].pageX - touchX;
                const deltaY = e.touches[0].pageY - touchY;
                playerGroup.rotation.y -= deltaX * 0.006;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - deltaY * 0.006));
                touchX = e.touches[0].pageX;
                touchY = e.touches[0].pageY;
            }
        }, { passive: false });

        const manager = nipplejs.create({ zone: document.getElementById('joystick'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white' });
        manager.on('move', (e, d) => { moveJoy.x = d.vector.x; moveJoy.y = -d.vector.y; });
        manager.on('end', () => { moveJoy.x = 0; moveJoy.y = 0; });

        document.onmousemove = (e) => {
            if(document.pointerLockElement) {
                playerGroup.rotation.y -= e.movementX * 0.003;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.003));
            }
        };

        // --- БОТИ ---
        function spawnEnemy() {
            if(enemies.length >= 6 || isDead) return;
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 2), new THREE.MeshLambertMaterial({ color: 0xe74c3c }));
            const angle = Math.random() * Math.PI * 2;
            mesh.position.set(playerGroup.position.x + Math.cos(angle)*40, 1.5, playerGroup.position.z + Math.sin(angle)*40);
            
            const hpCont = new THREE.Group();
            const hpBg = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 0.3), new THREE.MeshBasicMaterial({color: 0x000000}));
            const hpBar = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 0.3), new THREE.MeshBasicMaterial({color: 0xff0000}));
            hpBar.position.z = 0.01; hpCont.add(hpBg, hpBar);
            scene.add(mesh, hpCont);
            
            enemies.push({ 
                mesh, hpCont, hpBar, hp: 100, lastShot: 0,
                updateHP: function() { this.hpBar.scale.x = Math.max(0, this.hp/100); }
            });
        }
        setInterval(spawnEnemy, 3500);

        // --- ЦИКЛ АНІМАЦІЇ ---
        function animate() {
            if(isDead) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            const speed = (isSprinting || keys['ShiftLeft'] ? 18 : 10) * delta;
            let move = new THREE.Vector3();
            if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
            if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
            move.x += moveJoy.x; move.z += moveJoy.y;

            if(move.length() > 0) {
                move.normalize().multiplyScalar(speed).applyQuaternion(playerGroup.quaternion);
                if(!checkCollision(playerGroup.position, move)) playerGroup.position.add(move);
            }

            playerGroup.position.y += vY;
            if(playerGroup.position.y > 0) vY -= 0.6 * delta; 
            else { playerGroup.position.y = 0; vY = 0; canJump = true; }

            stormRadius -= 0.6 * delta;
            stormMesh.scale.set(stormRadius, 1, stormRadius);
            document.getElementById('storm-info').innerText = "ЗОНА: " + Math.floor(stormRadius) + "м";
            if(playerGroup.position.distanceTo(new THREE.Vector3(0,0,0)) > stormRadius) {
                playerHP -= 6 * delta;
            }

            enemies.forEach(e => {
                const dist = e.mesh.position.distanceTo(playerGroup.position);
                const dirToPlayer = new THREE.Vector3().subVectors(playerGroup.position, e.mesh.position).normalize();
                
                if(dist > 10) {
                    if (!checkEnemyCollision(e.mesh.position, dirToPlayer)) {
                        e.mesh.position.add(dirToPlayer.clone().multiplyScalar(6 * delta));
                    } else {
                        const sideDir = new THREE.Vector3(-dirToPlayer.z, 0, dirToPlayer.x);
                        e.mesh.position.add(sideDir.multiplyScalar(4 * delta));
                    }
                }

                if(dist < 18 && Date.now() - e.lastShot > 1800) {
                    playerHP -= 10; e.lastShot = Date.now();
                }
                
                e.hpCont.position.set(e.mesh.position.x, 5, e.mesh.position.z);
                e.hpCont.lookAt(playerGroup.position);
            });

            document.getElementById('hp-fill').style.width = playerHP + '%';
            document.getElementById('hp-text').innerText = Math.max(0, Math.ceil(playerHP)) + " HP";

            if(playerHP <= 0) { isDead = true; document.getElementById('death').style.display='flex'; document.exitPointerLock(); }

            weapon.position.z = THREE.MathUtils.lerp(weapon.position.z, -0.6, 10 * delta);
            renderer.render(scene, camera);
        }

        document.getElementById('b-shoot').ontouchstart = (e) => { e.preventDefault(); shoot(); };
        document.getElementById('b-build').ontouchstart = (e) => { e.preventDefault(); build(); };
        document.getElementById('b-jump').ontouchstart = (e) => { e.preventDefault(); if(canJump){vY=0.25; canJump=false;} };
        document.getElementById('b-sprint').ontouchstart = () => isSprinting = true;
        document.getElementById('b-sprint').ontouchend = () => isSprinting = false;

        animate();
    </script>
</body>
</html>
