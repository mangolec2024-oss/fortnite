<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortnite JS - Fixed Build</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; }
        #gui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; font-size: 13px; pointer-events: none; z-index: 10; }
        #storm-timer { position: absolute; top: 10px; right: 10px; color: #ff4444; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-weight: bold; z-index: 10; border: 1px solid #ff4444; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        
        /* Кнопки */
        .mobile-btn { position: absolute; width: 65px; height: 65px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; user-select: none; z-index: 20; border: 2px solid rgba(255,255,255,0.5); }
        #btn-shoot { bottom: 130px; right: 30px; background: rgba(255, 0, 0, 0.4); }
        #btn-build { bottom: 40px; right: 130px; background: rgba(0, 120, 255, 0.4); }
        #btn-jump { bottom: 130px; right: 130px; }
        #btn-sprint { bottom: 40px; right: 30px; }

        #joystick-move { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 20; }
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(60, 0, 0, 0.9); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button#restart { padding: 15px 40px; cursor: pointer; background: #fff; border: none; border-radius: 30px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="gui"><b>WASD</b> — Рух | <b>SHIFT</b> — Біг | <b>ПКМ / 🧱</b> — Будувати</div>
    <div id="storm-timer">ЗОНА ЗВУЖУЄТЬСЯ!</div>
    
    <div id="joystick-move"></div>
    <div id="btn-shoot" class="mobile-btn">🔫</div>
    <div id="btn-build" class="mobile-btn">🧱</div>
    <div id="btn-jump" class="mobile-btn">⬆️</div>
    <div id="btn-sprint" class="mobile-btn">🏃</div>

    <div id="death-screen">
        <h1 id="death-msg">ГРА ЗАКІНЧЕНА</h1>
        <button id="restart" onclick="location.reload()">ЗАНОВО</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

        const obstacles = [];
        const enemies = [];
        let isDead = false;
        let isSprinting = false;
        const clock = new THREE.Clock();

        // СВІТ
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshLambertMaterial({ color: 0x3d9943 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        function addTree(x, z) {
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(1.5, 5, 1.5), new THREE.MeshLambertMaterial({ color: 0x5d4037 }));
            trunk.position.set(x, 2.5, z);
            scene.add(trunk);
            const leaves = new THREE.Mesh(new THREE.BoxGeometry(5, 5, 5), new THREE.MeshLambertMaterial({ color: 0x2e7d32 }));
            leaves.position.set(x, 6, z);
            scene.add(leaves);
            obstacles.push(trunk);
        }

        function addMountain(x, z) {
            const mount = new THREE.Mesh(new THREE.ConeGeometry(30, 60, 4), new THREE.MeshLambertMaterial({ color: 0x757575 }));
            mount.position.set(x, 30, z);
            scene.add(mount);
            obstacles.push(mount);
        }

        for(let i=0; i<30; i++) addTree(Math.random()*600-300, Math.random()*600-300);
        for(let i=0; i<10; i++) addMountain(Math.random()*1000-500, Math.random()*1000-500);

        // ЗОНА
        let stormRadius = 400;
        const storm = new THREE.Mesh(
            new THREE.CylinderGeometry(1, 1, 500, 64, 1, true),
            new THREE.MeshBasicMaterial({ color: 0x6600ff, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
        );
        scene.add(storm);

        // ГРАВЕЦЬ
        const player = new THREE.Group();
        scene.add(player);
        player.add(camera);
        camera.position.y = 1.7;

        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.8), new THREE.MeshLambertMaterial({ color: 0x222222 }));
        gun.position.set(0.35, 1.4, -0.5);
        player.add(gun);

        // КЕРУВАННЯ
        let keys = {};
        let moveInput = { x: 0, y: 0 };
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if(e.code === 'ShiftLeft') isSprinting = true;
        });
        document.addEventListener('keyup', (e) => { 
            keys[e.code] = false;
            if(e.code === 'ShiftLeft') isSprinting = false;
        });

        // БУДІВНИЦТВО ТА СТРІЛЬБА (PC)
        window.addEventListener('mousedown', (e) => {
            if (!document.pointerLockElement && window.innerWidth > 1000) { document.body.requestPointerLock(); return; }
            if (e.button === 0) shoot();
            if (e.button === 2) buildWall(); // Права кнопка миші
        });
        window.addEventListener('contextmenu', (e) => e.preventDefault()); // Вимикаємо стандартне меню ПКМ

        function shoot() {
            gun.position.z += 0.2;
            const ray = new THREE.Raycaster();
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            ray.set(player.position, dir);
            const hits = ray.intersectObjects(enemies.map(e => e.mesh));
            if(hits.length > 0) {
                const en = enemies.find(e => e.mesh === hits[0].object);
                en.health -= 50;
                if(en.health <= 0) { scene.remove(en.mesh); enemies.splice(enemies.indexOf(en), 1); }
            }
        }

        function buildWall() {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(5, 4, 0.8), new THREE.MeshLambertMaterial({ color: 0x7d5a44 }));
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            // Ставимо стіну трохи далі від гравця
            const spawnPos = player.position.clone().add(dir.multiplyScalar(5));
            wall.position.set(spawnPos.x, 2, spawnPos.z);
            wall.rotation.y = player.rotation.y;
            scene.add(wall);
            obstacles.push(wall);
        }

        // МОБІЛЬНІ ПОДІЇ
        document.getElementById('btn-shoot').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
        document.getElementById('btn-build').addEventListener('touchstart', (e) => { e.preventDefault(); buildWall(); });
        document.getElementById('btn-sprint').addEventListener('touchstart', (e) => { e.preventDefault(); isSprinting = true; });
        document.getElementById('btn-sprint').addEventListener('touchend', () => isSprinting = false);
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if(canJump) { vY = 0.25; canJump = false; } });

        // Джойстик та Огляд
        const joy = nipplejs.create({ zone: document.getElementById('joystick-move'), mode: 'static', position: { left: '70px', bottom: '70px' }, color: 'white' });
        joy.on('move', (evt, data) => { moveInput.x = data.vector.x; moveInput.y = -data.vector.y; });
        joy.on('end', () => { moveInput.x = 0; moveInput.y = 0; });

        let tX, tY;
        document.addEventListener('touchstart', (e) => { if(e.touches[0].clientX > window.innerWidth/2) { tX = e.touches[0].clientX; tY = e.touches[0].clientY; }}, {passive:false});
        document.addEventListener('touchmove', (e) => {
            for(let t of e.touches) {
                if(t.clientX > window.innerWidth/2) {
                    player.rotation.y -= (t.clientX - tX) * 0.007;
                    camera.rotation.x -= (t.clientY - tY) * 0.007;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                    tX = t.clientX; tY = t.clientY;
                }
            }
        }, {passive:false});

        document.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                player.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // КОЛІЗІЇ
        const raycaster = new THREE.Raycaster();
        function checkCol(pos, dir, dist) {
            if (dir.length() === 0) return false;
            raycaster.set(pos.clone().add(new THREE.Vector3(0, 1, 0)), dir.clone().normalize());
            const hits = raycaster.intersectObjects(obstacles);
            return hits.length > 0 && hits[0].distance < dist;
        }

        // ЦИКЛ
        let vY = 0, canJump = true;
        function animate() {
            if (isDead) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Рух
            const speed = (isSprinting ? 20 : 10) * delta;
            let m = new THREE.Vector3();
            if(keys['KeyW']) m.z -= 1; if(keys['KeyS']) m.z += 1;
            if(keys['KeyA']) m.x -= 1; if(keys['KeyD']) m.x += 1;
            m.x += moveInput.x; m.z += moveInput.y;

            if(m.length() > 0) {
                m.normalize().multiplyScalar(speed).applyQuaternion(player.quaternion);
                if(!checkCol(player.position, m, 1.8)) player.position.add(m);
            }

            // Гравітація
            if(keys['Space'] && canJump) { vY = 0.25; canJump = false; }
            player.position.y += vY;
            vY -= 0.6 * delta;
            if(player.position.y <= 0) { player.position.y = 0; vY = 0; canJump = true; }

            // Зона
            stormRadius -= 1.2 * delta;
            storm.scale.set(stormRadius, 1, stormRadius);
            if(player.position.distanceTo(new THREE.Vector3(0,0,0)) > stormRadius) {
                isDead = true;
                document.getElementById('death-screen').style.display = 'flex';
            }

            // Вороги
            enemies.forEach(e => {
                const d = new THREE.Vector3().subVectors(player.position, e.mesh.position).normalize();
                const s = d.clone().multiplyScalar(4 * delta);
                if(!checkCol(e.mesh.position, s, 2)) e.mesh.position.add(s);
                if(e.mesh.position.distanceTo(player.position) < 2) {
                    isDead = true;
                    document.getElementById('death-screen').style.display = 'flex';
                }
            });

            gun.position.z = THREE.MathUtils.lerp(gun.position.z, -0.5, 5 * delta);
            renderer.render(scene, camera);
        }
        
        // Спавн NPC
        setInterval(() => {
            if(enemies.length < 10 && !isDead) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshLambertMaterial({ color: 0xff0000 }));
                const a = Math.random() * 6.28;
                m.position.set(Math.cos(a)*70, 1, Math.sin(a)*70);
                scene.add(m);
                enemies.push({ mesh: m, health: 100 });
            }
        }, 4000);

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
